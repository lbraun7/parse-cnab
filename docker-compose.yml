version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: cnab_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cnab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cnab_secret}
      POSTGRES_DB: ${POSTGRES_DB:-cnab_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cnab}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cnab_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cnab}:${POSTGRES_PASSWORD:-cnab_secret}@db:5432/${POSTGRES_DB:-cnab_db}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cnab_frontend
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
